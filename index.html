<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="style.css" />
    <script type="module" src="script.js"></script>
  </head>
  <body>
    <main class="wrapper">
      <h1 class="page-title">Tic Tac Toe</h1>
      <form action="">
        <ul class="list-form">
          <li class="form-item">
            <label for="player-one">Name Player One</label>
            <input
              class="input-field"
              id="player-one"
              name="player-one"
              type="text"
              required
            />
          </li>
          <li class="form-item">
            <p>Mark Player One</p>
            <ul class="radio-list">
              <li class="radio-item">
                <input type="radio" name="mark" id="markX" value="X" checked />
                <label for="markX">X</label>
              </li>
              <li class="radio-item">
                <input type="radio" name="mark" id="markO" value="O" />
                <label for="markO">O</label>
              </li>
            </ul>
          </li>
          <li class="form-item">
            <label for="player-two">Name Player Two</label>
            <input
              class="input-field"
              id="player-two"
              name="player-two"
              type="text"
              required
            />
          </li>
          <li class="form-item">
            <button class="new-game-btn">New game</button>
          </li>
        </ul>
      </form>
      <div class="grid">
        <div class="cell" id="cell1-00" fill="empty"></div>
        <div class="cell" id="cell2-01" fill="empty"></div>
        <div class="cell" id="cell3-02" fill="full">O</div>
        <div class="cell" id="cell4-10" fill="full">X</div>
        <div class="cell" id="cell5-11" fill="empty"></div>
        <div class="cell" id="cell6-12" fill="empty"></div>
        <div class="cell" id="cell7-20" fill="empty"></div>
        <div class="cell" id="cell8-21" fill="empty"></div>
        <div class="cell" id="cell9-22" fill="empty"></div>
      </div>
    </main>
  </body>
</html>
